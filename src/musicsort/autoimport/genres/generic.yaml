# Generic tag-to-genre mappings.
#
# Canonical aliases that any source might write into ID3 — bare genre
# names, common variants, casing/spacing/hyphenation alternatives.
# Source-specific compound names (e.g. Beatport's "Techno (Peak Time /
# Driving)") live in their respective files; this file covers the basics.
#
# Format: `<tag>: <category name>`. Tag matching is case- and whitespace-
# insensitive; the case here is purely cosmetic. Category names must
# match a `name:` in genres.yaml exactly.

version: 1
source: Generic

mappings:

